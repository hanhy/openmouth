<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>OpenMouth - Voice & Text Chat</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
    }
    .container {
      width: 100%;
      max-width: 600px;
      background: white;
      border-radius: 20px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.3);
      overflow: hidden;
    }
    .header {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      padding: 20px;
      text-align: center;
    }
    .header h1 { font-size: 24px; margin-bottom: 5px; }
    .header p { opacity: 0.9; font-size: 14px; }
    .status {
      padding: 10px 20px;
      background: #f8f9fa;
      border-bottom: 1px solid #e9ecef;
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 13px;
    }
    .status-indicator {
      display: inline-block;
      width: 8px;
      height: 8px;
      border-radius: 50%;
      margin-right: 6px;
    }
    .status-indicator.connected { background: #28a745; }
    .status-indicator.disconnected { background: #dc3545; }
    .status-indicator.connecting { background: #ffc107; animation: pulse 1s infinite; }
    @keyframes pulse { 50% { opacity: 0.5; } }
    .messages {
      height: 400px;
      overflow-y: auto;
      padding: 20px;
      background: #f8f9fa;
    }
    .message {
      margin-bottom: 15px;
      display: flex;
      flex-direction: column;
    }
    .message.sent { align-items: flex-end; }
    .message.received { align-items: flex-start; }
    .message-bubble {
      max-width: 80%;
      padding: 12px 16px;
      border-radius: 18px;
      font-size: 14px;
      line-height: 1.4;
    }
    .message.sent .message-bubble {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      border-bottom-right-radius: 4px;
    }
    .message.received .message-bubble {
      background: white;
      color: #333;
      border-bottom-left-radius: 4px;
      box-shadow: 0 2px 5px rgba(0,0,0,0.1);
    }
    .message-time {
      font-size: 11px;
      color: #999;
      margin-top: 4px;
      padding: 0 4px;
    }
    .input-area {
      padding: 20px;
      background: white;
      border-top: 1px solid #e9ecef;
    }
    .input-row {
      display: flex;
      gap: 10px;
      margin-bottom: 10px;
    }
    #messageInput {
      flex: 1;
      padding: 12px 16px;
      border: 2px solid #e9ecef;
      border-radius: 25px;
      font-size: 14px;
      outline: none;
      transition: border-color 0.3s;
    }
    #messageInput:focus { border-color: #667eea; }
    .btn {
      padding: 12px 20px;
      border: none;
      border-radius: 25px;
      font-size: 14px;
      cursor: pointer;
      transition: all 0.3s;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .btn-primary {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
    }
    .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 5px 15px rgba(102,126,234,0.4); }
    .btn-secondary {
      background: #f8f9fa;
      color: #333;
      border: 2px solid #e9ecef;
    }
    .btn-secondary:hover { background: #e9ecef; }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; }
    .voice-btn {
      width: 50px;
      height: 50px;
      border-radius: 50%;
      padding: 0;
      justify-content: center;
    }
    .voice-btn.recording {
      background: #dc3545;
      animation: pulse-red 1s infinite;
    }
    @keyframes pulse-red { 50% { background: #ff6b6b; } }
    .system-message {
      text-align: center;
      color: #999;
      font-size: 12px;
      padding: 10px;
      font-style: italic;
    }
    .controls {
      display: flex;
      gap: 10px;
      justify-content: center;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>🎤 OpenMouth</h1>
      <p>Voice & Text Conversation</p>
    </div>
    
    <div class="status">
      <span>
        <span class="status-indicator" id="statusIndicator"></span>
        <span id="statusText">Disconnected</span>
      </span>
      <span id="sessionId">-</span>
    </div>
    
    <div class="messages" id="messages">
      <div class="system-message">Connect to start chatting...</div>
    </div>
    
    <div class="input-area">
      <div class="input-row">
        <input type="text" id="messageInput" placeholder="Type a message..." disabled />
        <button class="btn btn-primary" id="sendBtn" disabled>
          <span>📤</span> Send
        </button>
      </div>
      <div class="controls">
        <button class="btn btn-secondary" id="connectBtn">
          <span>🔌</span> Connect
        </button>
        <button class="btn btn-secondary voice-btn" id="voiceBtn" disabled>
          <span>🎤</span>
        </button>
      </div>
    </div>
  </div>

  <script>
    let ws = null;
    let mediaRecorder = null;
    let audioChunks = [];
    let isRecording = false;

    const statusIndicator = document.getElementById('statusIndicator');
    const statusText = document.getElementById('statusText');
    const sessionIdEl = document.getElementById('sessionId');
    const messagesEl = document.getElementById('messages');
    const messageInput = document.getElementById('messageInput');
    const sendBtn = document.getElementById('sendBtn');
    const connectBtn = document.getElementById('connectBtn');
    const voiceBtn = document.getElementById('voiceBtn');

    function updateStatus(state, sessionId = '') {
      statusIndicator.className = 'status-indicator ' + state;
      statusText.textContent = state.charAt(0).toUpperCase() + state.slice(1);
      sessionIdEl.textContent = sessionId || '-';
      
      const connected = state === 'connected';
      messageInput.disabled = !connected;
      sendBtn.disabled = !connected;
      voiceBtn.disabled = !connected;
      connectBtn.textContent = connected ? '🔌 Disconnect' : '🔌 Connect';
    }

    function addMessage(content, type, time = new Date()) {
      const timeStr = time.toLocaleTimeString('zh-CN', { hour: '2-digit', minute: '2-digit' });
      const msgEl = document.createElement('div');
      msgEl.className = `message ${type}`;
      msgEl.innerHTML = `
        <div class="message-bubble">${escapeHtml(content)}</div>
        <div class="message-time">${timeStr}</div>
      `;
      messagesEl.appendChild(msgEl);
      messagesEl.scrollTop = messagesEl.scrollHeight;
    }

    function addSystemMessage(content) {
      const msgEl = document.createElement('div');
      msgEl.className = 'system-message';
      msgEl.textContent = content;
      messagesEl.appendChild(msgEl);
      messagesEl.scrollTop = messagesEl.scrollHeight;
    }

    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }

    function connect() {
      const url = `ws://${window.location.hostname}:8765`;
      addSystemMessage(`Connecting to ${url}...`);
      
      ws = new WebSocket(url);
      
      ws.onopen = () => {
        updateStatus('connected');
        addSystemMessage('Connected!');
      };
      
      ws.onmessage = (event) => {
        const data = JSON.parse(event.data);
        console.log('Received:', data);
        
        switch(data.type) {
          case 'welcome':
            sessionIdEl.textContent = data.sessionId;
            addSystemMessage(data.message);
            break;
          case 'ack':
            addMessage(`✓ ${data.message}`, 'received');
            break;
          case 'message':
            addMessage(data.content, 'received');
            break;
          case 'pong':
            console.log('Pong received');
            break;
          case 'error':
            addSystemMessage(`Error: ${data.message}`);
            break;
        }
      };
      
      ws.onclose = () => {
        updateStatus('disconnected');
        sessionIdEl.textContent = '-';
        addSystemMessage('Disconnected');
      };
      
      ws.onerror = (error) => {
        console.error('WebSocket error:', error);
        addSystemMessage('Connection error');
        updateStatus('disconnected');
      };
    }

    function disconnect() {
      if (ws) {
        ws.close();
        ws = null;
      }
    }

    function sendMessage() {
      const content = messageInput.value.trim();
      if (!content || !ws) return;
      
      ws.send(JSON.stringify({
        type: 'text',
        content: content
      }));
      
      addMessage(content, 'sent');
      messageInput.value = '';
    }

    async function startRecording() {
      try {
        const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
        mediaRecorder = new MediaRecorder(stream);
        audioChunks = [];
        
        mediaRecorder.ondataavailable = (event) => {
          audioChunks.push(event.data);
        };
        
        mediaRecorder.onstop = async () => {
          const audioBlob = new Blob(audioChunks, { type: 'audio/webm' });
          const base64 = await blobToBase64(audioBlob);
          
          if (ws) {
            ws.send(JSON.stringify({
              type: 'voice',
              content: base64.split(',')[1] // Remove data:image prefix
            }));
            addSystemMessage('Voice message sent');
          }
          
          stream.getTracks().forEach(track => track.stop());
        };
        
        mediaRecorder.start();
        isRecording = true;
        voiceBtn.classList.add('recording');
        voiceBtn.innerHTML = '<span>⏹</span>';
        addSystemMessage('Recording... Click to stop');
        
      } catch (error) {
        console.error('Recording error:', error);
        addSystemMessage('Microphone access denied');
      }
    }

    function stopRecording() {
      if (mediaRecorder && isRecording) {
        mediaRecorder.stop();
        isRecording = false;
        voiceBtn.classList.remove('recording');
        voiceBtn.innerHTML = '<span>🎤</span>';
      }
    }

    function blobToBase64(blob) {
      return new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.onloadend = () => resolve(reader.result);
        reader.onerror = reject;
        reader.readAsDataURL(blob);
      });
    }

    // Event listeners
    connectBtn.addEventListener('click', () => {
      if (ws) {
        disconnect();
      } else {
        connect();
      }
    });

    sendBtn.addEventListener('click', sendMessage);
    messageInput.addEventListener('keypress', (e) => {
      if (e.key === 'Enter') sendMessage();
    });

    voiceBtn.addEventListener('click', () => {
      if (isRecording) {
        stopRecording();
      } else {
        startRecording();
      }
    });

    // Initialize
    updateStatus('disconnected');
  </script>
</body>
</html>
